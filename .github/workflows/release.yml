name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      repository:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build sdist + wheel
        run: uv build

      - name: Check distributions with twine
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    # On tag push: also publish to TestPyPI first (dry run).
    # On workflow_dispatch: only when the input selects testpypi.
    if: ${{ (github.event_name == 'push') || (inputs.repository == 'testpypi') }}
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (OIDC trusted publishing)
        run: uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    # Real PyPI only on tag push, or an explicit workflow_dispatch choice.
    if: ${{ (github.event_name == 'push') || (inputs.repository == 'pypi') }}
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        run: uv publish --trusted-publishing always
